name: Scrape maimai song data

on:
  schedule:
    # Tue–Fri at 10:30 AM JST (01:30 UTC), 30min after game update
    - cron: "30 1 * * 2-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - run: vp install

      - name: Add missing songs (song-scraper)
        working-directory: scripts/song-scraper
        run: vp run add-missing

      - name: Sync mai-chart data
        working-directory: scripts/mai-chart
        run: vp run sync

      - name: Commit updated JSONs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/maidb-data/data/songs/songs.json \
                  packages/maidb-data/data/songs/metadata.json \
                  packages/maidb-data/data/songs/filters.json \
                  packages/maidb-data/data/songs/latest-only.json \
                  packages/maidb-data/data/mai-charts/charts.json
          git diff --cached --quiet || git commit -m "chore(maidb-data): sync songs and charts"
          git push
