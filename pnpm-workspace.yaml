packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@aws-sdk/client-s3": ^3.1014.0
  "@resvg/resvg-js": ^2.6.2
  "@types/node": ^24
  convex: ^1.34.0
  dotenv: ^17.3.1
  satori: ^0.26.0
  tsx: ^4.21.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
