packages:
  - apps/*
  - packages/*
  - scripts/*
  - tools/*

catalog:
  "@aws-sdk/client-s3": ^3.1014.0
  "@cloudflare/vite-plugin": ^1.30.0
  "@fontsource-variable/figtree": ^5.2.10
  "@hugeicons/core-free-icons": ^4.0.0
  "@hugeicons/react": ^1.1.6
  "@resvg/resvg-js": ^2.6.2
  "@tailwindcss/vite": ^4.2.2
  "@types/node": ^24
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  cmdk: ^1.1.1
  convex: ^1.34.0
  dotenv: ^17.3.1
  exa-js: ^2.12.1
  fuse.js: ^7.1.0
  html-to-image: ^1.11.13
  nanoid: ^5.1.7
  radix-ui: ^1.4.3
  satori: ^0.26.0
  shadcn: ^4.1.0
  sharp: ^0.34.5
  tailwind-merge: ^3.5.0
  tailwindcss: ^4.2.2
  tsx: ^4.21.0
  tw-animate-css: ^1.4.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  wrangler: ^4.76.0
  zod: ^4.3.6

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
